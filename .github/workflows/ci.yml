name: CI

on:
  push:
    branches: ["dev/**", "release/**"]
  pull_request:
    branches: ["dev/**", "release/**"]
  schedule:
    # SITL integration tests: daily at 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check src tests scripts

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run mypy src/ --strict

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pytest tests/unit/ -v

  registry-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run python scripts/lint_registry.py

  sitl-integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Setup ArduPilot SITL
        run: ./scripts/setup_sitl.sh
      - run: uv sync
      - run: uv run pytest tests/integration/ -v --timeout=120
